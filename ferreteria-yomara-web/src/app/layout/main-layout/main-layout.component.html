<div class="flex h-screen overflow-hidden bg-surface">
  
  <aside class="w-64 bg-inverse-surface text-white flex flex-col shadow-2xl border-r border-primary/20">
    <div class="p-6 border-b border-white/5 flex items-center gap-3">
      <span class="material-symbols-outlined text-primary-container text-3xl">hardware</span>
      <h1 class="font-black tracking-tighter uppercase text-xl">YOMARA</h1>
    </div>

    <app-sidebar class="flex-1"></app-sidebar> 

    <div class="p-4 bg-black/20 border-t border-white/5">
      <button (click)="logout()" class="w-full flex items-center justify-center gap-2 p-2 bg-error text-white rounded-md hover:bg-red-700 transition-colors font-bold text-xs">
        <span class="material-symbols-outlined text-sm">logout</span> SALIR
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-surface-variant flex items-center justify-between px-8 shadow-sm">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 bg-primary-container rounded-full animate-pulse"></span>
        <span class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest">Servidor Online</span>
      </div>
      
      <div class="flex items-center gap-4">
        <span class="text-xs font-bold text-inverse-surface uppercase">Bienvenido, {{ username }}</span>
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-xs font-black">
          {{ username.charAt(0) | uppercase }}
        </div>
      </div>
    </header>

    <section class="flex-1 overflow-y-auto p-8 bg-slate-50">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
