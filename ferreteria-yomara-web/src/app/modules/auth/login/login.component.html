<div class="bg-inverse-surface font-body text-on-surface min-h-screen flex flex-col md:flex-row overflow-hidden">
  
  <section class="hidden md:flex flex-1 relative bg-inverse-surface overflow-hidden items-center justify-center border-r border-outline-variant/10">
    <div class="absolute inset-0 z-0">
      <img alt="Ferretería Industrial" class="w-full h-full object-cover mix-blend-multiply grayscale opacity-40" src="https://images.unsplash.com/photo-1586864387967-d02ef85d93e8?q=80&w=2070&auto=format&fit=crop"/>
    </div>
    <div class="relative z-10 p-12 max-w-xl">
      <div class="mt-12 grid grid-cols-2 gap-6">
        <div class="bg-white/10 backdrop-blur-md p-6 rounded-md border-l-4 border-primary-container">
          <span class="material-symbols-outlined text-primary-container mb-2">construction</span>
          <p class="text-white font-bold text-xl leading-tight">Control Total</p>
        </div>
        <div class="bg-white/10 backdrop-blur-md p-6 rounded-md border-l-4 border-primary-container">
          <span class="material-symbols-outlined text-primary-container mb-2">inventory</span>
          <p class="text-white font-bold text-xl leading-tight">Multi-Sede</p>
        </div>
      </div>
    </div>
  </section>

  <section class="flex-1 flex flex-col items-center justify-center bg-surface relative">
    
    <div class="w-full max-w-md p-8 md:p-12 z-10">
      <div class="mb-10 text-center md:text-left">
        <div class="inline-flex items-center justify-center md:justify-start gap-2 mb-4">
          <div class="w-10 h-10 bg-inverse-surface flex items-center justify-center rounded-sm">
            <span class="material-symbols-outlined text-primary-container" style='font-variation-settings: "FILL" 1;'>hardware</span>
          </div>
          <span class="text-2xl font-black tracking-tighter uppercase text-inverse-surface">Ferretería Yomara</span>
        </div>
        <h2 class="text-3xl font-bold tracking-tight text-on-surface">Panel de Gestión</h2>
        <p class="text-on-surface-variant mt-2 font-medium">Ingresa tus credenciales para continuar</p>
      </div>

      @if (errorMessage) {
        <div class="mb-6 p-4 bg-error/10 border-l-4 border-error text-error text-sm font-bold flex items-center gap-3">
          <span class="material-symbols-outlined">error</span>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onLogin()" class="space-y-6">
        
        <div class="space-y-2">
          <label class="text-[11px] font-black uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">person</span>
            Usuario
          </label>
          <input 
            type="text" 
            name="username"
            [(ngModel)]="loginData.username" 
            class="w-full bg-surface-container-high border-none rounded-md px-4 py-3 text-on-surface font-medium placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" 
            placeholder="ej: j.perez" 
            required />
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-[11px] font-black uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">lock</span>
              Contraseña
            </label>
          </div>
          <div class="relative">
            <input 
              type="password" 
              name="password"
              [(ngModel)]="loginData.password" 
              class="w-full bg-surface-container-high border-none rounded-md px-4 py-3 text-on-surface font-medium placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" 
              placeholder="••••••••" 
              required />
          </div>
        </div>

        <div class="pt-4">
          <button 
            type="submit" 
            [disabled]="isLoading"
            class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-md shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:grayscale">
            
            @if (isLoading) {
              <span class="animate-spin material-symbols-outlined">progress_activity</span>
              <span>Validando...</span>
            } @else {
              <span>Iniciar Sesión</span>
              <span class="material-symbols-outlined">arrow_forward</span>
            }
          </button>
        </div>

      </form>
    </div>

    <div class="absolute bottom-0 right-0 w-32 h-32 opacity-10 pointer-events-none overflow-hidden">
      <svg class="w-full h-full fill-none stroke-on-surface-variant stroke-[0.5]" viewBox="0 0 100 100">
        <circle cx="100" cy="100" r="80"></circle>
        <circle cx="100" cy="100" r="60"></circle>
        <circle cx="100" cy="100" r="40"></circle>
      </svg>
    </div>
  </section>
</div>
